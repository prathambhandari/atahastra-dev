<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>Atahastra | Web Development, UI/UX Design & Mobile Apps</title>

      content="Atahastra is a digital agency specializing in web development, UI/UX design, mobile apps, and no-code solutions for startups and growing brands. One team from idea to launch."
    />

      name="keywords"
      content="Atahastra, digital agency, web development, web design, UI/UX design, mobile app development, no-code, WordPress, Shopify, startups"
    />

    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="theme-color" content="#000000" id="theme-color" />
    <link rel="canonical" href="https://atahastra.com/" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/favicon.png?v=2" />
    <link rel="apple-touch-icon" href="/favicon.png?v=2" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph / Facebook / LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Atahastra" />
    <meta property="og:url" content="https://atahastra.com/" />

      property="og:description"
      content="Atahastra is a digital agency specializing in web development, UI/UX design, mobile apps, and no-code solutions for startups and growing brands. One team from idea to launch."

    <meta
      name="twitter:description"
      content="Atahastra is a digital agency specializing in web development, UI/UX design, mobile apps, and no-code solutions for startups and growing brands."
    />
    <meta name="twitter:image" content="https://atahastra.com/logo.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Structured Data: Organization (Google + AI search) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Atahastra",
        "alternateName": "Atahastra Digital Agency",
        "url": "https://atahastra.com",
        "logo": "https://atahastra.com/logo.png",
        "image": "https://atahastra.com/logo.png",
        "description": "Atahastra is a digital agency specializing in web development, UI/UX design, mobile apps, and no-code solutions for startups and growing brands.",
        "email": "admin@atahastra.com",
        "foundingDate": "2024",
        "knowsAbout": [
          "Web Development",
          "Web Design",
          "UI/UX Design",
          "Mobile App Development",
          "No-Code Development",
          "WordPress",
          "Shopify"
        ],
        "sameAs": [
          "https://www.linkedin.com/company/atahastra/",
          "https://x.com/atahastra",
          "https://www.instagram.com/atahastra/"
        ],
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "customer support",
          "email": "admin@atahastra.com",
          "url": "https://app.cal.com/atahastra",
          "availableLanguage": ["English"]
        }
      }
    </script>

    <!-- Structured Data: WebSite -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Atahastra",
        "alternateName": "Atahastra Digital Agency",
        "url": "https://atahastra.com"
      }
    </script>

    <!-- Structured Data: Services offered -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ProfessionalService",
        "name": "Atahastra",
        "url": "https://atahastra.com",
        "image": "https://atahastra.com/logo.png",
        "email": "admin@atahastra.com",
        "priceRange": "$$",
        "description": "Digital agency for web development, UI/UX design, mobile apps, and no-code solutions.",
        "sameAs": [
          "https://www.linkedin.com/company/atahastra/",
          "https://x.com/atahastra",
          "https://www.instagram.com/atahastra/"
        ],
        "hasOfferCatalog": {
          "@type": "OfferCatalog",
          "name": "Services",
          "itemListElement": [
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "Web Development",
                "description": "Custom websites, WordPress and Shopify stores, and web apps with modern technologies."
              }
            },
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "Mobile App Development",
                "description": "iOS and Android apps, concept to launch."
              }
            },
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "UI/UX Design",
                "description": "Wireframes and prototypes for smooth user flows."
              }
            }
          ]
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
